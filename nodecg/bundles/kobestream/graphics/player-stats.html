<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="common.css" />
  <style>
    #card { position: absolute; left: 70px; bottom: 80px; width: 520px; border-radius: 18px; overflow: hidden; }
    .header { padding: 20px 26px; font-size: 26px; font-weight: 700; background: rgba(0,0,0,0.25); }
    .player { padding: 24px 26px; display: flex; align-items: center; gap: 20px; }
    .number { font-size: 76px; font-weight: 900; width: 110px; text-align: center; }
    .name { font-size: 34px; font-weight: 800; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 26px 26px; }
    .stat { background: rgba(255,255,255,0.14); padding: 14px; border-radius: 10px; font-size: 24px; }
    .label { opacity: .8; font-size: 16px; display:block; }
  </style>
</head>
<body>
  <div id="card" class="panel">
    <div class="header" id="title">Player Stats</div>
    <div class="player"><div class="number" id="number">6</div><div class="name" id="name">Player Name</div></div>
    <div class="stats">
      <div class="stat"><span class="label">Goals</span><span id="goals">0</span></div>
      <div class="stat"><span class="label">Assists</span><span id="assists">0</span></div>
      <div class="stat"><span class="label">Yellow cards</span><span id="yellowCards">0</span></div>
      <div class="stat"><span class="label">Red cards</span><span id="redCards">0</span></div>
    </div>
  </div>
  <script src="player-stats.js"></script>
</body>
</html>
